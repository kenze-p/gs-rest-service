name: CI - Build and Test

on:
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Notify Slack - Build Started
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CI_CHANNEL_ID }}
          slack-message: "🚀 Build started for commit ${{ github.sha }} on branch ${{ github.ref_name }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: cd complete && mvn clean package -DskipTests

      - name: Notify Slack - Build Finished
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CI_CHANNEL_ID }}
          slack-message: "🏗️ Build finished on branch ${{ github.ref_name }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Run Tests
        run: |
          cd complete && mvn test | tee test-results.txt
          echo "TEST_RESULTS<<EOF" >> $GITHUB_ENV
          cat complete/test-results.txt | tail -20 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Notify Slack - Test Results
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ secrets.SLACK_CI_CHANNEL_ID }}
          slack-message: "🧪 Testing completed with status ${{ job.status }}!\n```${{ env.TEST_RESULTS }}```"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
