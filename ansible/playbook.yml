---
- name: Deploy gs-rest-service
  hosts: webservers
  become: yes

  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Pull Docker image
      docker_image:
        name: gidzo028/gs-rest-service:latest
        source: pull

    - name: Run Docker container
      docker_container:
        name: gs-rest-service
        image: gidzo028/gs-rest-service:latest
        state: started
        restart_policy: always
        ports:
          - "777:8080"